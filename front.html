<!doctype html>
<link href="https://fonts.cdnfonts.com/css/calculator" rel="stylesheet" />

<html>
    <head>
        <body>
            <script>
                function input_token(token) {
                    const inputField = document.getElementById("display");
                    inputField.value += token;
                }
                function del_token(token) {
                    const inputField = document.getElementById("display");
                    inputField.value = inputField.value.slice(0, -1);
                }
                function clear_input() {
                    const inputField = document.getElementById("display");
                    inputField.value = "";
                }

                let num_stack = new Array();
                let op_stack = new Array();

                const precedence = {
                    X: 2,
                    "÷": 2,
                    "+": 1,
                    "-": 1,
                };

                function stack_input(input) {
                    const tokens = input.match(
                        /(\d+(?:\.\d+)?|\+|\-|X|÷|\(|\))/g,
                    );

                    for (let token of tokens) {
                        if (isNum(token)) {
                            num_stack.push(Number(token));
                        } else if (isOp(token)) {
                            while (
                                op_stack.length > 0 &&
                                isOp(op_stack[op_stack.length - 1]) &&
                                precedence[op_stack[op_stack.length - 1]] >=
                                    precedence[token]
                            ) {
                                num_stack.push(op_stack.pop());
                            }
                            op_stack.push(token);
                        } else if (token === "(") {
                            op_stack.push(token);
                        } else if (token === ")") {
                            while (
                                op_stack.length > 0 &&
                                op_stack[op_stack.length - 1] !== "("
                            ) {
                                num_stack.push(op_stack.pop());
                            }
                            if (op_stack.length === 0)
                                throw new Error("Error de Parentesis");
                            op_stack.pop();
                        }
                    }

                    while (op_stack.length > 0) {
                        const op = op_stack.pop();
                        if (op === "(" || op === ")")
                            throw new Error("Error de Parentesis");
                        num_stack.push(op);
                    }
                }

                function isNum(token) {
                    return !isNaN(token) && token !== "";
                }

                function isOp(token) {
                    return ["+", "-", "X", "÷"].includes(token);
                }

                function eval_stack() {
                    const eval_s = new Array();

                    for (let token of num_stack) {
                        if (typeof token === "number") {
                            eval_s.push(token);
                        } else if (isOp(token)) {
                            if (eval_s.length < 2) return "Syntax Error";

                            const b = eval_s.pop(); //segundo num
                            const a = eval_s.pop(); // primer num

                            let result;
                            if (token === "+") result = a + b;
                            else if (token === "-") result = a - b;
                            else if (token === "X") result = a * b;
                            else if (token === "÷") {
                                if (b === 0) return "Math Error";
                                result = a / b;
                            }

                            eval_s.push(result);
                        } else {
                            return "invalido: " + token;
                        }
                    }

                    if (eval_s.length !== 1) return "expresion invalida";
                    return eval_s[0];
                }

                function calculate() {
                    num_stack = [];
                    op_stack = [];

                    const inputField = document.getElementById("display");
                    stack_input(inputField.value);
                    result = eval_stack();
                    inputField.value = result;

                    show_flame();
                }

                function show_flame() {
                    const flame = document.getElementById("flame");
                    flame.src = "flame-gif.gif?t=" + Date.now();
                    flame.style.visibility = "visible";

                    setTimeout(() => {
                        flame.style.visibility = "hidden";
                    }, 1800);
                }
            </script>

            <!-- Calculator -->
            <!-- Outer Style -->
            <button
                onclick="show_flame()"
                style="
                    background-color: #1f1d28;
                    padding: 30px 8px;
                    margin-top: -200px;
                "
            ></button>
            <div>
                <img
                    id="flame"
                    src="flame-gif.gif"
                    height="150px"
                    style="
                        visibility: hidden;
                        margin-bottom: -10px;
                        margin-top: -30px;
                    "
                />
                <section
                    style="
                        background-color: #e4e1d8;
                        background-image: url(silver.jpg);
                        width: 325px;
                        height: 575px;
                        overflow: auto;
                        border: solid dimgray 2px;
                        border-bottom: solid black 5px;
                    "
                >
                    <!-- Inner Style -->
                    <section
                        style="
                            background-color: #8e8c80;
                            background-image: url(silver_2.jpg);
                            width: 300px;
                            border-top-left-radius: 5px;
                            border-bottom-left-radius: 5px;
                            border-left: solid black 5px;
                            border-top: solid black 5px;
                            border-bottom: solid black 5px;
                            margin-left: 20px;
                            margin-top: 60px;
                        "
                    >
                        <h4
                            style="
                                padding-left: 210px;
                                padding-top: 20px;
                                margin-bottom: 5px;
                            "
                        >
                            QL-10
                        </h4>
                        <!-- Display -->
                        <section>
                            <div
                                style="
                                    background-color: black;
                                    width: 230px;
                                    margin-left: 35px;
                                "
                            >
                                <input
                                    readonly
                                    id="display"
                                    style="
                                        background-color: darkolivegreen;
                                        margin-top: 14px;
                                        margin-bottom: 14px;
                                        margin-left: 10px;
                                        border-width: 4px;
                                        width: 200px;
                                        font-size: 22px;
                                        font-weight: bold;
                                        text-align: right;
                                        font-family:
                                            &quot;Calculator&quot;, sans-serif;
                                    "
                                />
                            </div>
                        </section>
                        <!-- Buttons -->
                        <section
                            style="
                                display: grid;
                                grid-template-columns: repeat(
                                    5,
                                    minmax(0, 1fr)
                                );
                                justify-items: center;
                                align-items: center;
                                padding-bottom: 18px;
                            "
                        >
                            <!-- Top Row -->
                            <div>
                                <h6>(</h6>
                                <button
                                    class="number-button"
                                    onclick="input_token('(')"
                                ></button>
                            </div>
                            <div>
                                <h6>7</h6>
                                <button
                                    class="number-button"
                                    onclick="input_token('7')"
                                ></button>
                            </div>
                            <div>
                                <h6>8</h6>
                                <button
                                    class="number-button"
                                    onclick="input_token('8')"
                                ></button>
                            </div>
                            <div>
                                <h6>9</h6>
                                <button
                                    class="number-button"
                                    onclick="input_token('9')"
                                ></button>
                            </div>
                            <div>
                                <h6>÷</h6>
                                <button
                                    class="number-button"
                                    onclick="input_token('÷')"
                                ></button>
                            </div>
                            <!-- Mid Top Row -->
                            <div>
                                <h6>)</h6>
                                <button
                                    class="number-button"
                                    onclick="input_token(')')"
                                ></button>
                            </div>
                            <div>
                                <h6>4</h6>
                                <button
                                    class="number-button"
                                    onclick="input_token('4')"
                                ></button>
                            </div>
                            <div>
                                <h6>5</h6>
                                <button
                                    class="number-button"
                                    onclick="input_token('5')"
                                ></button>
                            </div>
                            <div>
                                <h6>6</h6>
                                <button
                                    class="number-button"
                                    onclick="input_token('6')"
                                ></button>
                            </div>
                            <div>
                                <h6>x</h6>
                                <button
                                    class="number-button"
                                    onclick="input_token('X')"
                                ></button>
                            </div>
                            <!-- Mid Low Row -->
                            <div>
                                <h6>C</h6>
                                <button
                                    class="number-button"
                                    onclick="clear_input()"
                                ></button>
                            </div>
                            <div>
                                <h6>1</h6>
                                <button
                                    class="number-button"
                                    onclick="input_token('1')"
                                ></button>
                            </div>
                            <div>
                                <h6>2</h6>
                                <button
                                    class="number-button"
                                    onclick="input_token('2')"
                                ></button>
                            </div>
                            <div>
                                <h6>3</h6>
                                <button
                                    class="number-button"
                                    onclick="input_token('3')"
                                ></button>
                            </div>
                            <div>
                                <h6>━</h6>
                                <button
                                    class="number-button"
                                    onclick="input_token('-')"
                                ></button>
                            </div>
                            <!-- Bottom Row -->
                            <div>
                                <h6>⬅</h6>
                                <button
                                    class="number-button"
                                    onclick="del_token()"
                                ></button>
                            </div>
                            <div>
                                <h6>.</h6>
                                <button
                                    class="number-button"
                                    onclick="input_token('.')"
                                ></button>
                            </div>
                            <div>
                                <h6>0</h6>
                                <button
                                    class="number-button"
                                    onclick="input_token('0')"
                                ></button>
                            </div>
                            <div>
                                <h6>=</h6>
                                <button
                                    class="number-button"
                                    onclick="calculate()"
                                ></button>
                            </div>
                            <div>
                                <h6>+</h6>
                                <button
                                    class="number-button"
                                    onclick="input_token('+')"
                                ></button>
                            </div>
                        </section>
                        <!-- Logo -->
                        <h3>CASIO</h3>
                    </section>
                </section>
            </div>
            <img
                src="hand.png"
                width="1050"
                style="
                    position: absolute;
                    z-index: -1;
                    margin-left: 500px;
                    margin-top: 200px;
                "
            />
        </body>

        <style>
            body {
                background-image: url(background.jpeg);
                margin: 0;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .number-button {
                background-color: #1f1d28;

            h4 {

            }
            h6 {
                font-size: 14px;

                padding-left: 11px;
                font-family: "Arial", sans-serif;
            }
        </style>
    </head>
</html>
